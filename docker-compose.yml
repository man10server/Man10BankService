services:
  db:
    image: mysql:8.4
    container_name: man10-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: man10_bank
      MYSQL_USER: app
      MYSQL_PASSWORD: app_pw
      MYSQL_ROOT_PASSWORD: root_pw
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_pw"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - db_data:/var/lib/mysql
      # 初回起動時にスキーマを作成（ALTER系は避け、db.sql のみ適用）
      - ./sql/db.sql:/docker-entrypoint-initdb.d/1_schema.sql:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: man10-bank-service:local
    container_name: man10-bank
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Host: db
      Database__Port: "3306"
      Database__Name: man10_bank
      Database__User: root
      Database__Password: root_pw
      Database__TreatTinyAsBoolean: "true"
      # 本番環境では APIキーの設定が必須（未設定だと起動時に失敗する）。
      # 環境変数でキーを注入する例（インデックス 0 を上書き）:
      #   Auth__ApiKeys__0__Key: "<長いランダム文字列>"
      #   Auth__ApiKeys__0__Name: "man10bank-plugin"
      #   Auth__ApiKeys__0__Scopes__0: "admin"
    ports:
      - "8080:8080"

volumes:
  db_data:
